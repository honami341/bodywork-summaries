<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">独自理論を解説するLLMの設計ジレンマ</title>
  <desc id="desc">自由にさせると拡大解釈し、縛りすぎると退屈になる。その間で、壊せない中心を固定し、外側を自由に探索させる設計を示す図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F2E8"/>
      <stop offset="1" stop-color="#EEF3F0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#403224" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="560" rx="34" fill="url(#bg)"/>
  <circle cx="104" cy="64" r="54" fill="#F1DFC3" opacity="0.8"/>
  <circle cx="1100" cy="480" r="92" fill="#DDEBE4" opacity="0.85"/>

  <text x="600" y="62" text-anchor="middle" fill="#2E2A25" font-size="23" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">「そんなことは言っていない」と「つまらない回答」の間で</text>
  <text x="600" y="94" text-anchor="middle" fill="#756C62" font-size="15" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">独自理論を壊さず、未知の問いには考えさせる</text>

  <g filter="url(#shadow)">
    <rect x="62" y="145" width="280" height="255" rx="28" fill="#FFFDF8" stroke="#DED5C9" stroke-width="2"/>
    <circle cx="202" cy="210" r="45" fill="#F3DFD3"/>
    <path d="M178 210h48M202 186v48M170 178l64 64M234 178l-64 64" stroke="#B96C48" stroke-width="6" stroke-linecap="round"/>
    <text x="202" y="285" text-anchor="middle" fill="#2E2A25" font-size="22" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">自由すぎる</text>
    <text x="202" y="322" text-anchor="middle" fill="#756C62" font-size="15" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">拡大解釈・捏造・越権</text>
    <text x="202" y="350" text-anchor="middle" fill="#756C62" font-size="15" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">独自理論の万能化</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="858" y="145" width="280" height="255" rx="28" fill="#FFFDF8" stroke="#DED5C9" stroke-width="2"/>
    <circle cx="998" cy="210" r="45" fill="#DCEBF2"/>
    <path d="M970 210h56" stroke="#4F7F9C" stroke-width="8" stroke-linecap="round"/>
    <text x="998" y="285" text-anchor="middle" fill="#2E2A25" font-size="22" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">縛りすぎる</text>
    <text x="998" y="322" text-anchor="middle" fill="#756C62" font-size="15" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">一般論・萎縮・無回答</text>
    <text x="998" y="350" text-anchor="middle" fill="#756C62" font-size="15" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">安全だが役に立たない</text>
  </g>

  <path d="M366 272h78" stroke="#C98A3D" stroke-width="5" stroke-linecap="round"/>
  <path d="M434 258l22 14-22 14" fill="none" stroke="#C98A3D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M744 272h78" stroke="#C98A3D" stroke-width="5" stroke-linecap="round"/>
  <path d="M812 258l22 14-22 14" fill="none" stroke="#C98A3D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <circle cx="600" cy="272" r="132" fill="#FFFDF8" stroke="#DED5C9" stroke-width="2"/>
    <circle cx="600" cy="272" r="67" fill="#2E2A25"/>
    <text x="600" y="260" text-anchor="middle" fill="#FFFDF8" font-size="18" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">壊せない中心</text>
    <text x="600" y="287" text-anchor="middle" fill="#F1E9DD" font-size="13" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">意味・出所・判定権</text>

    <circle cx="600" cy="163" r="31" fill="#F7E4C4"/><text x="600" y="168" text-anchor="middle" fill="#855717" font-size="13" font-weight="700" font-family="sans-serif">定義</text>
    <circle cx="694" cy="218" r="31" fill="#DCEBF2"/><text x="694" y="223" text-anchor="middle" fill="#4F7F9C" font-size="13" font-weight="700" font-family="sans-serif">分担</text>
    <circle cx="694" cy="326" r="31" fill="#E8E1EF"/><text x="694" y="331" text-anchor="middle" fill="#75658D" font-size="13" font-weight="700" font-family="sans-serif">採掘</text>
    <circle cx="600" cy="381" r="31" fill="#DEEEE5"/><text x="600" y="386" text-anchor="middle" fill="#5F8B76" font-size="13" font-weight="700" font-family="sans-serif">保存</text>
    <circle cx="506" cy="326" r="31" fill="#F2DDDD"/><text x="506" y="331" text-anchor="middle" fill="#A96768" font-size="13" font-weight="700" font-family="sans-serif">境界</text>
    <circle cx="506" cy="218" r="31" fill="#ECE5D8"/><text x="506" y="223" text-anchor="middle" fill="#756C62" font-size="13" font-weight="700" font-family="sans-serif">確度</text>
  </g>

  <rect x="196" y="454" width="808" height="62" rx="18" fill="#2E2A25"/>
  <text x="600" y="479" text-anchor="middle" fill="#FFFDF8" font-size="16" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">固定するのは中心。自由にするのは、その外側の探索。</text>
  <text x="600" y="501" text-anchor="middle" fill="#D8D0C6" font-size="13" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">言っていないことは言わせない。それでも、考えることまではやめさせない。</text>
</svg>