<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">四つの設計対策</title>
  <desc id="desc">定義化と階層化、役割分担と問いの分解、失敗からの思考採掘、文脈資産化の四つを示す図。</desc>
  <rect width="1200" height="430" rx="30" fill="#F7F2E8"/>
  <text x="600" y="54" text-anchor="middle" fill="#2E2A25" font-size="24" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">4つの対策を組み合わせる</text>
  <text x="600" y="82" text-anchor="middle" fill="#756C62" font-size="14" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">一つの強いプロンプトではなく、異なる役割を持つ設計を重ねる</text>

  <g transform="translate(48 116)">
    <rect width="252" height="245" rx="24" fill="#FFFDF8" stroke="#E4D7C6" stroke-width="2"/>
    <circle cx="126" cy="60" r="36" fill="#F7E4C4"/>
    <rect x="102" y="39" width="48" height="10" rx="3" fill="#C98A3D"/>
    <rect x="108" y="56" width="36" height="10" rx="3" fill="#C98A3D" opacity=".8"/>
    <rect x="114" y="73" width="24" height="10" rx="3" fill="#C98A3D" opacity=".6"/>
    <text x="126" y="126" text-anchor="middle" fill="#855717" font-size="17" font-weight="700" font-family="sans-serif">1. 定義化と階層化</text>
    <text x="126" y="157" text-anchor="middle" fill="#2E2A25" font-size="14" font-weight="700" font-family="sans-serif">意味と位置を固定する</text>
    <text x="126" y="188" text-anchor="middle" fill="#756C62" font-size="12" font-family="sans-serif">概念の輪郭を作り</text>
    <text x="126" y="208" text-anchor="middle" fill="#756C62" font-size="12" font-family="sans-serif">理論内の上下関係を決める</text>
  </g>

  <g transform="translate(332 116)">
    <rect width="252" height="245" rx="24" fill="#FFFDF8" stroke="#D5E3EA" stroke-width="2"/>
    <circle cx="126" cy="60" r="36" fill="#DCEBF2"/>
    <circle cx="126" cy="60" r="8" fill="#4F7F9C"/>
    <circle cx="126" cy="29" r="6" fill="#4F7F9C"/><circle cx="157" cy="60" r="6" fill="#4F7F9C"/><circle cx="126" cy="91" r="6" fill="#4F7F9C"/><circle cx="95" cy="60" r="6" fill="#4F7F9C"/>
    <path d="M126 37v15M149 60h-15M126 83V68M103 60h15" stroke="#4F7F9C" stroke-width="3"/>
    <text x="126" y="126" text-anchor="middle" fill="#4F7F9C" font-size="17" font-weight="700" font-family="sans-serif">2. 役割分担と分解</text>
    <text x="126" y="157" text-anchor="middle" fill="#2E2A25" font-size="14" font-weight="700" font-family="sans-serif">万能理論化を防ぐ</text>
    <text x="126" y="188" text-anchor="middle" fill="#756C62" font-size="12" font-family="sans-serif">問いを分け</text>
    <text x="126" y="208" text-anchor="middle" fill="#756C62" font-size="12" font-family="sans-serif">適切な知識へ担当させる</text>
  </g>

  <g transform="translate(616 116)">
    <rect width="252" height="245" rx="24" fill="#FFFDF8" stroke="#DDD3E5" stroke-width="2"/>
    <circle cx="126" cy="60" r="36" fill="#E8E1EF"/>
    <path d="M92 78l28-28 18 18 25-34" fill="none" stroke="#75658D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="92" cy="78" r="5" fill="#75658D"/><circle cx="120" cy="50" r="5" fill="#75658D"/><circle cx="138" cy="68" r="5" fill="#75658D"/><circle cx="163" cy="34" r="5" fill="#75658D"/>
    <text x="126" y="126" text-anchor="middle" fill="#75658D" font-size="17" font-weight="700" font-family="sans-serif">3. 失敗から採掘</text>
    <text x="126" y="157" text-anchor="middle" fill="#2E2A25" font-size="14" font-weight="700" font-family="sans-serif">違和感を原理へ変える</text>
    <text x="126" y="188" text-anchor="middle" fill="#756C62" font-size="12" font-family="sans-serif">「なんか違う」から</text>
    <text x="126" y="208" text-anchor="middle" fill="#756C62" font-size="12" font-family="sans-serif">暗黙の判断基準を掘り出す</text>
  </g>

  <g transform="translate(900 116)">
    <rect width="252" height="245" rx="24" fill="#FFFDF8" stroke="#D4E3DA" stroke-width="2"/>
    <circle cx="126" cy="60" r="36" fill="#DEEEE5"/>
    <rect x="99" y="34" width="54" height="52" rx="6" fill="none" stroke="#5F8B76" stroke-width="4"/>
    <path d="M109 48h34M109 60h26M109 72h20" stroke="#5F8B76" stroke-width="3" stroke-linecap="round"/>
    <circle cx="154" cy="83" r="12" fill="#5F8B76"/>
    <path d="M149 83l4 4 7-9" fill="none" stroke="#FFFDF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="126" y="126" text-anchor="middle" fill="#5F8B76" font-size="17" font-weight="700" font-family="sans-serif">4. 文脈資産化</text>
    <text x="126" y="157" text-anchor="middle" fill="#2E2A25" font-size="14" font-weight="700" font-family="sans-serif">良い見え方を保存する</text>
    <text x="126" y="188" text-anchor="middle" fill="#756C62" font-size="12" font-family="sans-serif">回答文ではなく</text>
    <text x="126" y="208" text-anchor="middle" fill="#756C62" font-size="12" font-family="sans-serif">回答を生んだ座標系を残す</text>
  </g>

  <path d="M300 238h25M584 238h25M868 238h25" stroke="#C98A3D" stroke-width="4" stroke-linecap="round"/>
  <path d="M318 229l13 9-13 9M602 229l13 9-13 9M886 229l13 9-13 9" fill="none" stroke="#C98A3D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>