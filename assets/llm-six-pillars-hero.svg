<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">LLMに独自理論を実装するための6本柱</title>
  <desc id="desc">自由な質問が、意味、知識階層、推論、権限、文脈、改善の6つの設計を通って、理論に沿った回答になる図。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#6a5742" flood-opacity=".13"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#C98A3D"/></marker>
  </defs>
  <rect width="1200" height="540" rx="36" fill="#F7F4EE"/>
  <circle cx="75" cy="65" r="135" fill="#F1DFCA" opacity=".7"/>
  <circle cx="1140" cy="470" r="170" fill="#DFEBE4" opacity=".8"/>

  <g filter="url(#shadow)">
    <path d="M70 245c0-45 37-82 82-82 18-42 59-70 107-70 64 0 116 49 120 112 49 7 86 49 86 100 0 57-46 103-103 103H158c-49 0-88-40-88-89 0-19 6-37 16-52-10-13-16-28-16-42Z" fill="#FFFDF8" stroke="#DED5C9" stroke-width="3"/>
    <text x="264" y="260" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="700" fill="#2E2A25">自由な質問</text>
    <text x="264" y="305" text-anchor="middle" font-family="sans-serif" font-size="21" fill="#756C62">未知・曖昧・多様</text>
  </g>

  <path d="M455 270H535" stroke="#C98A3D" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(730 270)" filter="url(#shadow)">
    <circle r="190" fill="#FFFDF8" stroke="#DED5C9" stroke-width="3"/>
    <circle r="78" fill="#2E2A25"/>
    <text y="-10" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#FFFDF8">独自理論の</text>
    <text y="25" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#FFFDF8">文脈</text>

    <g transform="translate(0 -145)"><circle r="54" fill="#F4DFBE"/><text y="7" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#8A5C1D">意味</text></g>
    <g transform="translate(126 -73)"><circle r="54" fill="#DCE8EF"/><text y="7" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#466F87">階層</text></g>
    <g transform="translate(126 73)"><circle r="54" fill="#DDECE4"/><text y="7" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#4F7865">推論</text></g>
    <g transform="translate(0 145)"><circle r="54" fill="#F0DDDD"/><text y="7" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#935859">権限</text></g>
    <g transform="translate(-126 73)"><circle r="54" fill="#E7E0EE"/><text y="7" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#69597D">文脈</text></g>
    <g transform="translate(-126 -73)"><circle r="54" fill="#F1DFD3"/><text y="7" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#9A5C3E">改善</text></g>
  </g>

  <path d="M925 270H1000" stroke="#C98A3D" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="1020" y="155" width="140" height="230" rx="24" fill="#2E2A25"/>
    <circle cx="1050" cy="205" r="7" fill="#C98A3D"/><path d="M1075 205h55" stroke="#FFFDF8" stroke-width="10" stroke-linecap="round"/>
    <circle cx="1050" cy="255" r="7" fill="#5F8B76"/><path d="M1075 255h42" stroke="#FFFDF8" stroke-width="10" stroke-linecap="round"/>
    <circle cx="1050" cy="305" r="7" fill="#75658D"/><path d="M1075 305h62" stroke="#FFFDF8" stroke-width="10" stroke-linecap="round"/>
    <text x="1090" y="430" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#2E2A25">理論に沿った回答</text>
  </g>
</svg>